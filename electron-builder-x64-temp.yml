appId: com.elhegazi.retailer
productName: ElHegazi Retailer
executableName: ElHegazi-Retailer
copyright: Copyright (c) 2026

files:
  - electron/**/*
  - client/dist/**/*
  - server/**/*
  - shared/**/*
  - package.json
  - "!server/data/**"
  - "!server/undefined/**"
  - "!server/backups/**"
  - "!server/**/__tests__/**"
  - "!**/*.map"

directories:
  output: release/x64-only

asar: true
asarUnpack:
  - "**/*.node"

win:
  icon: electron/assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64

artifactName: 2_INSTALL_SECOND_ElHegazi-Retailer-x64.exe

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  perMachine: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: ElHegazi Retailer

buildDependenciesFromSource: false
npmRebuild: true
