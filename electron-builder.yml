appId: com.elhegazi.retailer
productName: ElHegazi Retailer
executableName: ElHegazi-Retailer
copyright: Copyright (c) 2026

files:
  - electron/**/*
  - client/dist/**/*
  - server/**/*
  - shared/**/*
  - package.json
  - "!server/data/**"
  - "!server/undefined/**"
  - "!server/backups/**"
  - "!server/**/__tests__/**"
  - "!**/*.map"

directories:
  output: release

publish:
  provider: github
  owner: M7mod-hegazy
  repo: Retailer
  releaseType: release

asar: true
asarUnpack:
  - "**/*.node"

# Hard gate: fail the build if a packed better_sqlite3.node does not match the
# architecture being built. This is the guard that prevents shipping a 32-bit
# installer with a 64-bit DB driver (the "database corrupted" crash on old PCs).
afterPack: electron/scripts/afterpack-verify.js

win:
  icon: electron/assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64
        - ia32

artifactName: ${productName}-${version}-${arch}.exe

linux:
  icon: electron/assets

nsis:
  oneClick: false
  include: electron/nsis/installer.nsh
  allowToChangeInstallationDirectory: false
  allowElevation: true
  perMachine: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: ElHegazi Retailer
  menuCategory: ElHegazi
  runAfterFinish: true
  deleteAppDataOnUninstall: false
  installerIcon: electron/assets/icon.ico
  uninstallerIcon: electron/assets/icon.ico
  installerHeaderIcon: electron/assets/icon.ico
  installerSidebar: electron/assets/installerSidebar.bmp
  uninstallerSidebar: electron/assets/installerSidebar.bmp
  installerHeader: electron/assets/installerHeader.bmp
  multiLanguageInstaller: true
  displayLanguageSelector: true
  installerLanguages:
    - ar_SA
    - en_US

# Use prebuilt native binaries (better-sqlite3) instead of compiling from source.
# Compiling would require Visual Studio Build Tools; prebuilds exist for both x64 and ia32.
buildDependenciesFromSource: false
# Native binaries are swapped + verified PER ARCH by electron/scripts/build-dist.js
# before each electron-builder run. Letting electron-builder rebuild here would
# (a) be a redundant compile and (b) historically left BOTH arches with the same
# (x64) binary — the bug that shipped a 64-bit DB driver in the 32-bit installer.
# Always build via `npm run dist` / `npm run release` (which call build-dist.js),
# never `electron-builder --win` directly for a multi-arch run.
npmRebuild: false
