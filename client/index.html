<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>client</title>
  </head>
  <body>
    <div id="root"></div>
    
    <div id="splash-screen" class="splash-container">
      <div class="splash-center">
        <div class="logo-orbit-container">
          <div class="orbit-path"></div>
          <div class="orbit-dot" id="orbit-dot"></div>
          
          <!-- Symmetrical Central Schematic HUD -->
          <svg class="splash-svg-logo" viewBox="0 0 32 32" fill="none" stroke="currentColor">
            <!-- Group 0: Files (Folder/Document) -->
            <g id="g-files" class="blueprint-group active">
              <path class="draw-path" d="M6,4 L18,4 L26,12 L26,28 L6,28 Z" stroke-width="1.2" stroke-linejoin="round"/>
              <path class="draw-path" d="M18,4 L18,12 L26,12" stroke-width="1.2" stroke-linejoin="round"/>
              <line class="draw-path" x1="11" y1="17" x2="21" y2="17" stroke-width="1.2"/>
              <line class="draw-path" x1="11" y1="22" x2="21" y2="22" stroke-width="1.2"/>
            </g>
            
            <!-- Group 1: Database Cylinder -->
            <g id="g-db" class="blueprint-group">
              <ellipse class="draw-path" cx="16" cy="8" rx="8" ry="3" stroke-width="1.2"/>
              <path class="draw-path" d="M8,8 L8,17 A8,3 0 0,0 24,17 L24,8" stroke-width="1.2"/>
              <path class="draw-path" d="M8,17 L8,26 A8,3 0 0,0 24,26 L24,17" stroke-width="1.2"/>
              <line class="draw-path" x1="11" y1="13" x2="21" y2="13" stroke-dasharray="2 2" stroke-width="0.8"/>
              <line class="draw-path" x1="11" y1="21" x2="21" y2="21" stroke-dasharray="2 2" stroke-width="0.8"/>
            </g>
            
            <!-- Group 2: Security Key -->
            <g id="g-sec" class="blueprint-group">
              <circle class="draw-path" cx="16" cy="10" r="5" stroke-width="1.2"/>
              <line class="draw-path" x1="16" y1="15" x2="16" y2="27" stroke-width="1.2"/>
              <line class="draw-path" x1="16" y1="19" x2="21" y2="19" stroke-width="1.2"/>
              <line class="draw-path" x1="16" y1="23" x2="21" y2="23" stroke-width="1.2"/>
            </g>
            
            <!-- Group 3: App Grid Logo -->
            <g id="g-logo" class="blueprint-group">
              <rect class="draw-path" x="4" y="4" width="24" height="24" rx="4" ry="4" stroke-width="1.2"/>
              <line class="draw-path" x1="4" y1="12" x2="28" y2="12" stroke-width="1.2"/>
              <line class="draw-path" x1="12" y1="28" x2="12" y2="12" stroke-width="1.2"/>
            </g>
          </svg>
        </div>
        
        <h1 class="splash-title">الحجازي</h1>
        <div class="splash-subtitle-row">
          <span class="splash-subtitle">ELHEGAZI RETAILER</span>
          <span class="splash-dot-divider">•</span>
          <span class="splash-percentage" id="splash-percentage">0%</span>
        </div>

        <div class="splash-progress-track">
          <div class="splash-progress-fill" id="splash-progress-fill"></div>
        </div>

        <div class="splash-status" id="splash-status">جاري تهيئة ملفات النظام...</div>
      </div>
    </div>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap');

      @keyframes blob-drift {
        0%, 100% { transform: scale(1) translate(0, 0); }
        40%       { transform: scale(1.06) translate(12px, -10px); }
        70%       { transform: scale(0.95) translate(-8px, 12px); }
      }

      @keyframes orbit-spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }

      @keyframes bar-fill {
        from { transform: scaleX(0); }
        to   { transform: scaleX(1); }
      }

      @keyframes fade-up {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      body, html {
        margin: 0;
        padding: 0;
        background: #eef2f7;
        height: 100vh;
        overflow: hidden;
        font-family: 'Tajawal', system-ui, sans-serif;
      }

      #root {
        width: 100%;
        height: 100%;
      }

      /* ── Aurora background ── */
      .splash-container {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        overflow: hidden;
        direction: rtl;
        will-change: opacity, transform;
        transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);

        background:
          radial-gradient(ellipse 90% 70% at 5%  10%,  rgba(5,  150, 105, 0.18) 0%, transparent 55%),
          radial-gradient(ellipse 70% 80% at 95% 95%,  rgba(56, 189, 248, 0.12) 0%, transparent 55%),
          radial-gradient(ellipse 60% 55% at 85% 5%,   rgba(16, 185, 129, 0.14) 0%, transparent 50%),
          radial-gradient(ellipse 55% 50% at 10% 90%,  rgba(99, 102, 241, 0.07) 0%, transparent 50%),
          #f0f4f8;
      }

      /* Slow-drifting dot grid */
      .splash-container::before {
        content: '';
        position: absolute;
        inset: -10%;
        background-image: radial-gradient(circle, rgba(15, 23, 42, 0.055) 1px, transparent 1px);
        background-size: 24px 24px;
        pointer-events: none;
        animation: blob-drift 16s ease-in-out infinite;
      }

      .splash-container.fade-out {
        opacity: 0;
        transform: scale(0.97);
        pointer-events: none;
      }

      /* ── Frosted-glass content card ── */
      .splash-center {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 44px 60px 40px;
        background: rgba(255, 255, 255, 0.62);
        backdrop-filter: blur(28px);
        -webkit-backdrop-filter: blur(28px);
        border: 1px solid rgba(255, 255, 255, 0.9);
        border-radius: 32px;
        box-shadow:
          0 2px 0   0   rgba(255, 255, 255, 0.8) inset,
          0 8px 32px    rgba(15,  23,  42,  0.08),
          0 32px 64px   rgba(5,  150, 105,  0.06);
        animation: fade-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      /* ── Icon ring ── */
      .logo-orbit-container {
        position: relative;
        width: 110px;
        height: 110px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 28px;
      }

      /* Outer emerald ring – always visible */
      .orbit-path {
        position: absolute;
        width: 96px;
        height: 96px;
        border: 1.5px solid rgba(5, 150, 105, 0.2);
        border-radius: 50%;
        pointer-events: none;
      }

      /* Spinning arc */
      .orbit-path::after {
        content: '';
        position: absolute;
        inset: -1.5px;
        border-radius: 50%;
        border: 1.5px solid transparent;
        border-top-color: #059669;
        border-right-color: rgba(5, 150, 105, 0.35);
        animation: orbit-spin 2.4s linear infinite;
      }

      /* Soft inner glow disc */
      .logo-orbit-container::before {
        content: '';
        position: absolute;
        width: 80px;
        height: 80px;
        background: radial-gradient(circle, rgba(5, 150, 105, 0.12) 0%, transparent 70%);
        border-radius: 50%;
        pointer-events: none;
        animation: blob-drift 8s ease-in-out infinite alternate;
      }

      /* Orbit dot hidden — replaced by spinning arc above */
      .orbit-dot { display: none; }

      /* ── SVG Icon ── */
      .splash-svg-logo {
        width: 56px;
        height: 56px;
        color: #059669;
        position: relative;
        z-index: 1;
      }

      .blueprint-group {
        opacity: 0;
        transform: scale(0.8);
        transform-origin: center center;
        transition: opacity 0.45s cubic-bezier(0.16, 1, 0.3, 1),
                    transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
        pointer-events: none;
      }

      .blueprint-group.active {
        opacity: 1;
        transform: scale(1);
      }

      .draw-path {
        stroke: #059669;
        stroke-linecap: round;
        stroke-linejoin: round;
        will-change: stroke-dashoffset;
      }

      /* ── Typography ── */
      .splash-title {
        font-size: 22px;
        font-weight: 700;
        color: #0f172a;
        margin: 0 0 4px 0;
        letter-spacing: 0.01em;
        text-align: center;
        font-family: 'Tajawal', sans-serif;
      }

      .splash-subtitle-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 24px;
      }

      .splash-subtitle {
        font-size: 9.5px;
        font-weight: 600;
        color: #94a3b8;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-family: 'Outfit', sans-serif;
      }

      .splash-dot-divider {
        font-size: 7px;
        color: #cbd5e1;
      }

      .splash-percentage {
        font-size: 9.5px;
        font-family: 'Outfit', monospace;
        font-weight: 700;
        color: #059669;
        letter-spacing: 0.06em;
      }

      /* ── Thin progress bar ── */
      .splash-progress-track {
        width: 160px;
        height: 2.5px;
        background: rgba(15, 23, 42, 0.07);
        border-radius: 99px;
        overflow: hidden;
        margin-bottom: 14px;
      }

      .splash-progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #059669, #34d399);
        border-radius: 99px;
        transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 0 6px rgba(5, 150, 105, 0.5);
      }

      .splash-status {
        font-size: 11px;
        font-weight: 500;
        color: #94a3b8;
        text-align: center;
        min-height: 18px;
        transition: opacity 0.25s ease;
        font-family: 'Tajawal', sans-serif;
        letter-spacing: 0.01em;
      }
    </style>

    <script>
      (function() {
        const percentTxt   = document.getElementById('splash-percentage');
        const statusTxt    = document.getElementById('splash-status');
        const progressFill = document.getElementById('splash-progress-fill');

        // Steps milestones
        const steps = [
          { target: 25,  ar: "الخطوة ٠١ // جاري تهيئة ملفات النظام...",          groupId: "g-files" },
          { target: 60,  ar: "الخطوة ٠٢ // الاتصال بقاعدة البيانات المحلية...",  groupId: "g-db"    },
          { target: 85,  ar: "الخطوة ٠٣ // التحقق من ترخيص التشغيل والأمان...", groupId: "g-sec"   },
          { target: 100, ar: "الخطوة ٠٤ // جاري تشغيل واجهة المعاملات...",       groupId: "g-logo"  }
        ];

        let currentPercent = 0;
        let currentStepIdx = 0;
        let isPaused = false;

        // 2. High-performance dynamic SVG blueprint drawing engine
        function drawGroupSVG(groupId) {
          const group = document.getElementById(groupId);
          if (!group) return;
          
          const paths = group.querySelectorAll('.draw-path');
          paths.forEach(p => {
            // Measure or fallback — getTotalLength throws on non-rendered elements
            let length = 80;
            try {
              if (p.getTotalLength) length = p.getTotalLength();
            } catch (_) {
              const tag = p.tagName.toLowerCase();
              if (tag === 'rect')    length = 96;
              else if (tag === 'ellipse') length = 38;
              else if (tag === 'circle')  length = 32;
              else if (tag === 'line')    length = 30;
            }
            
            p.style.strokeDasharray = length;
            p.style.strokeDashoffset = length;
            
            p.getBoundingClientRect(); // force layout reflow
            
            p.style.transition = 'stroke-dashoffset 0.8s cubic-bezier(0.1, 0.8, 0.2, 1)';
            p.style.strokeDashoffset = '0';
          });
        }

        // Initialize first group SVG laser drawing
        drawGroupSVG('g-files');

        function changeStatusText(newText) {
          if (!statusTxt) return;
          statusTxt.style.opacity = 0;
          setTimeout(() => {
            statusTxt.textContent = newText;
            statusTxt.style.opacity = 1;
          }, 200);
        }

        function switchBlueprintGroup(oldIdx, newIdx) {
          const oldGroup = document.getElementById(steps[oldIdx].groupId);
          const newGroup = document.getElementById(steps[newIdx].groupId);
          
          if (oldGroup) oldGroup.classList.remove('active');
          
          setTimeout(() => {
            if (newGroup) {
              newGroup.classList.add('active');
              drawGroupSVG(steps[newIdx].groupId);
            }
          }, 300); // smooth crossfade scale stagger
        }

        function update() {
          if (currentPercent >= 100) {
            orbitSpeed = 0.08;
            checkReactReady();
            return;
          }

          if (isPaused) return;

          const currentStep = steps[currentStepIdx];
          if (currentPercent >= currentStep.target && currentStepIdx < steps.length - 1) {
            isPaused = true;
            orbitSpeed = 0.01; // slow down orbit while processing milestone

            const oldIdx = currentStepIdx;
            currentStepIdx++;
            const nextStep = steps[currentStepIdx];
            
            setTimeout(() => {
              isPaused = false;
              orbitSpeed = 0.045; // recover speed
              changeStatusText(nextStep.ar);
              switchBlueprintGroup(oldIdx, currentStepIdx);
              tick();
            }, 300);
            
            return;
          }

          const increment = Math.floor(Math.random() * 2) + 1;
          currentPercent = Math.min(100, currentPercent + increment);
          
          if (percentTxt) percentTxt.textContent = currentPercent + '%';
          if (progressFill) progressFill.style.width = currentPercent + '%';

          const tickTime = Math.floor(Math.random() * 25) + 30; // variable tick
          setTimeout(update, tickTime);
        }

        function tick() {
          update();
        }

        setTimeout(tick, 300);

        function checkReactReady() {
          const root = document.getElementById('root');
          const splash = document.getElementById('splash-screen');
          
          const pollInterval = setInterval(() => {
            if (root && root.children.length > 0) {
              clearInterval(pollInterval);
              if (splash) {
                splash.classList.add('fade-out');
                setTimeout(() => {
                  splash.remove();
                }, 800);
              }
            }
          }, 80);
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
