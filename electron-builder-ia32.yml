appId: com.elhegazi.retailer
productName: ElHegazi Retailer
executableName: ElHegazi-Retailer
copyright: Copyright (c) 2026

files:
  - electron/**/*
  - client/dist/**/*
  - server/**/*
  - package.json
  - "!server/data/**"
  - "!server/**/__tests__/**"
  - "!**/*.map"

directories:
  output: release

publish:
  provider: github
  owner: M7mod-hegazy
  repo: Retailer
  releaseType: release

asar: true
asarUnpack:
  - "**/*.node"

win:
  icon: electron/assets/icon.ico
  target:
    - target: nsis
      arch:
        - ia32

artifactName: 2b_FOR_32BIT_WIN7_ElHegazi-Retailer-ia32.exe

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  perMachine: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: ElHegazi Retailer

buildDependenciesFromSource: false
npmRebuild: true
