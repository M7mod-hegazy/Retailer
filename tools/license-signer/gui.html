<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ElHegazi License Signer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f4f6f8; color: #0f172a;
    padding: 28px; font-size: 14px;
  }
  h1 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .sub { color: #64748b; font-size: 13px; margin-bottom: 22px; }
  .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 22px; box-shadow: 0 8px 24px rgba(15,23,42,.05); }
  label { display: block; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: #475569; margin: 14px 0 6px; }
  input[type=text], input[type=date] {
    width: 100%; padding: 11px 12px; border: 2px solid #e2e8f0; border-radius: 10px;
    font-size: 14px; font-family: inherit; outline: none;
  }
  input:focus { border-color: #059669; }
  .row { display: flex; gap: 18px; align-items: center; margin-top: 8px; }
  .radio { display: flex; align-items: center; gap: 6px; font-weight: 600; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  button.primary {
    width: 100%; margin-top: 22px; padding: 15px; border: 0; border-radius: 12px;
    background: #059669; color: #fff; font-size: 16px; font-weight: 800; cursor: pointer;
  }
  button.primary:hover:not(:disabled) { background: #047857; }
  button.secondary {
    background: #fff; border: 1px solid #cbd5e1; border-radius: 9px; padding: 8px 12px; font-weight: 700; cursor: pointer;
  }
  .result { margin-top: 18px; padding: 16px; border-radius: 12px; background: #ecfdf5; border: 1px solid #a7f3d0; display: none; }
  .result.show { display: block; }
  .result.err { background: #fef2f2; border-color: #fecaca; }
  .result h3 { font-size: 14px; margin-bottom: 6px; }
  .result code { display: block; word-break: break-all; font-size: 11px; color: #334155; margin-top: 8px; background:#fff; padding:8px; border-radius:8px; border: 1px solid #e2e8f0; }
  .result .hint { margin-top: 10px; font-size: 12px; color: #475569; line-height: 1.5; }
  .result .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .meta { font-size: 12px; color: #64748b; margin-top: 6px; }
  .warn { margin-top: 14px; padding: 12px; border-radius: 10px; background:#fffbeb; border:1px solid #fde68a; color:#92400e; font-weight:600; display:none; }
  .warn.show { display:block; }
  .warn good { background:#ecfdf5; border-color:#a7f3d0; color:#065f46; }
  .listhead { display:flex; align-items:center; justify-content:space-between; margin: 26px 0 10px; }
  .listhead h2 { font-size: 15px; font-weight: 800; }
  .listhead .count { font-size: 12px; color:#64748b; font-weight:700; }
  .pathinfo { font-size: 11px; color: #94a3b8; margin-bottom: 16px; font-family: ui-monospace, monospace; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  th, td { text-align:left; padding:8px 10px; border-bottom:1px solid #eef2f7; }
  th { color:#64748b; text-transform:uppercase; font-size:10px; letter-spacing:.05em; }
  td.mono { font-family: ui-monospace, monospace; color:#334155; }
  .empty { color:#94a3b8; font-size:13px; padding:14px 0; }
  .pill { font-size:10px; font-weight:800; padding:2px 8px; border-radius:99px; background:#ecfdf5; color:#047857; }
  .pill.sub { background:#eff6ff; color:#1d4ed8; }
  .pill.trial { background:#fff7ed; color:#c2410c; }
</style>
</head>
<body>
  <h1>License Signer</h1>
  <div class="sub">ElHegazi Retailer — seller tool.</div>

  <div class="pathinfo" id="pathDisplay"></div>

  <div class="warn" id="warn">
    No keypair found. Click below to create one (one-time).
    <button class="secondary" id="keygenBtn">Generate keypair</button>
  </div>

  <div class="card">
    <label for="fingerprint">Machine code</label>
    <input type="text" id="fingerprint" placeholder="7F3A-9C21-..." autocomplete="off" />

    <label for="name">Shop / customer name</label>
    <input type="text" id="name" placeholder="Ahmed Market" autocomplete="off" />

    <label>License type</label>
    <div class="row">
      <span class="radio"><input type="radio" name="type" value="perpetual" checked /> Perpetual</span>
      <span class="radio"><input type="radio" name="type" value="subscription" /> Subscription</span>
    </div>

    <div id="expiryWrap" style="display:none;">
      <label for="expires">Expires on</label>
      <input type="date" id="expires" />
    </div>

    <div class="row" style="margin-top:10px;">
      <span class="radio"><input type="checkbox" id="isTrial" /> Mark as trial</span>
    </div>

    <button class="primary" id="genBtn" disabled>Generate license.key</button>

    <div class="result" id="result"></div>
  </div>

  <div class="listhead">
    <h2>Issued licenses</h2>
    <span class="count" id="count"></span>
  </div>
  <div class="card" style="padding:6px 0;">
    <table>
      <thead>
        <tr><th>ID</th><th>Shop</th><th>Machine</th><th>License Key</th><th>Type</th><th>Date</th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none; padding-left:14px;">No licenses issued yet.</div>
  </div>

<script>
const $ = (id) => document.getElementById(id);
const API = ""; // same origin

async function api(method, path, body) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  return res.json();
}

function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function typePill(r) {
  if (r.features === "trial") return '<span class="pill trial">Trial</span>';
  if (r.expiresAt) return '<span class="pill sub">Sub · ' + escapeHtml(r.expiresAt) + '</span>';
  return '<span class="pill">Perpetual</span>';
}

async function refreshStatus() {
  const s = await api("GET", "/api/status");
  $("warn").classList.toggle("show", !s.keysExist);
  $("genBtn").disabled = !s.keysExist;
  $("pathDisplay").textContent = "Keys: " + (s.keysDir || "—") + "  ·  Data: " + (s.dataDir || "—");
}

async function refreshList() {
  const res = await api("GET", "/api/list");
  const rows = res.entries || [];
  $("count").textContent = rows.length ? rows.length + " total" : "";
  $("empty").style.display = rows.length ? "none" : "block";
  $("rows").innerHTML = rows.map((r) => {
    const machine = String(r.hardwareId || "").slice(0, 8).toUpperCase();
    const date = (r.issuedAt || "").slice(0, 10);
    const key = r.blob || "";
    const keyTrunc = key.length > 18 ? key.slice(0, 15) + "…" : key;
    return '<tr>' +
      '<td class="mono">' + escapeHtml(r.licenseId) + '</td>' +
      '<td>' + escapeHtml(r.issuedTo || "—") + '</td>' +
      '<td class="mono">' + escapeHtml(machine) + '</td>' +
      '<td class="mono" style="cursor:pointer;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="Click to copy full key" onclick="navigator.clipboard.writeText(\'' + escapeHtml(key) + '\').then(()=>{let t=this;t.textContent=\'Copied!\';setTimeout(()=>t.textContent=\'' + escapeHtml(keyTrunc) + '\',1200)})">' + escapeHtml(keyTrunc) + '</td>' +
      '<td>' + typePill(r) + '</td>' +
      '<td>' + escapeHtml(date) + '</td>' +
    '</tr>';
  }).join("");
}

refreshStatus();
refreshList();

$("keygenBtn").addEventListener("click", async () => {
  const r = await api("POST", "/api/keygen");
  if (r.ok) {
    alert("Keypair created at:\n" + r.privateKeyPath + "\n\nBack this up!");
    refreshStatus();
  } else {
    alert("Failed: " + r.error);
  }
});

document.querySelectorAll('input[name=type]').forEach((el) =>
  el.addEventListener("change", () => {
    const sub = document.querySelector('input[name=type]:checked').value === "subscription";
    $("expiryWrap").style.display = sub ? "block" : "none";
  })
);

$("genBtn").addEventListener("click", async () => {
  const fingerprint = $("fingerprint").value.trim();
  const name = $("name").value.trim();
  if (!fingerprint) { alert("Enter the machine code."); return; }

  const sub = document.querySelector('input[name=type]:checked').value === "subscription";
  const expiresAt = sub ? ($("expires").value || null) : null;
  const features = $("isTrial").checked ? "trial" : "full";

  $("genBtn").disabled = true;
  const r = await api("POST", "/api/generate", { fingerprint, name, expiresAt, features });
  $("genBtn").disabled = false;

  const box = $("result");
  box.classList.add("show");
  if (r.ok) {
    box.classList.remove("err");
    const code = r.activationCode || r.blob;
    box.innerHTML =
      '<h3>License saved (' + r.licenseId + (r.expiresAt ? ', expires ' + r.expiresAt : ', perpetual') + ')</h3>' +
      '<div class="meta">' + r.keyPath + ' · ' + code.length + ' chars</div>' +
      '<div class="hint">Download the .key file to copy to the customer PC, or copy the activation code below.</div>' +
      '<div class="actions">' +
        '<button class="secondary" id="dlBtn">Download license.key</button>' +
        '<button class="secondary" id="copyBtn">Copy activation code</button>' +
      '</div>' +
      '<code>' + code + '</code>';

    $("dlBtn").addEventListener("click", () => {
      const url = API + "/api/download?path=" + encodeURIComponent(r.keyPath);
      const a = document.createElement("a");
      a.href = url; a.download = "license.key";
      a.click();
    });

    $("copyBtn").addEventListener("click", () => {
      navigator.clipboard.writeText(code).then(() => {
        $("copyBtn").textContent = "Copied!";
        setTimeout(() => { $("copyBtn").textContent = "Copy activation code"; }, 1500);
      });
    });

    refreshList();
  } else {
    box.classList.add("err");
    box.innerHTML = '<h3>Error: ' + escapeHtml(r.error) + '</h3>';
  }
});
</script>
</body>
</html>
