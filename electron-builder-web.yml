appId: com.elhegazi.retailer.web
productName: ElHegazi Retailer Web
executableName: ElHegazi-Retailer-Web
copyright: Copyright (c) 2026

# Use the web entry point (opens browser + tray) instead of the windowed app.
extraMetadata:
  main: electron/web-main.js

files:
  - electron/**/*
  - client/dist/**/*
  - server/**/*
  - package.json
  - "!server/data/**"
  - "!server/undefined/**"
  - "!server/backups/**"
  - "!server/**/__tests__/**"
  - "!**/*.map"

directories:
  output: release

asar: true
asarUnpack:
  - "**/*.node"

win:
  icon: electron/assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64

artifactName: ${productName}-${version}-${arch}.exe

nsis:
  oneClick: false
  include: electron/nsis/installer.nsh
  allowToChangeInstallationDirectory: true
  allowElevation: true
  perMachine: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: ElHegazi Retailer Web

# Use prebuilt native binaries instead of compiling from source.
buildDependenciesFromSource: false
npmRebuild: true
