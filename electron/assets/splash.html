<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script>
  (function() {
    var themeColors = {
      emerald:  { hex: "#059669", rgb: "5, 150, 105" },
      midnight: { hex: "#14b8a6", rgb: "20, 184, 166" },
      obsidian: { hex: "#f59e0b", rgb: "245, 158, 11" },
      sepia:    { hex: "#a16207", rgb: "161, 98, 7" },
      candy:    { hex: "#d946ef", rgb: "217, 70, 239" },
      coffee:   { hex: "#8B5E3C", rgb: "139, 94, 60" },
      platinum: { hex: "#475569", rgb: "71, 85, 105" },
      sunset:   { hex: "#ea580c", rgb: "234, 88, 12" },
      frost:    { hex: "#3d8a9e", rgb: "61, 138, 158" },
      royal:    { hex: "#7928ca", rgb: "121, 40, 202" },
    };
    var saved = localStorage.getItem("app_theme") || "emerald";
    var colors = themeColors[saved] || themeColors.emerald;
    var root = document.documentElement;
    root.style.setProperty("--splash-primary", colors.hex);
    root.style.setProperty("--splash-primary-rgb", colors.rgb);
  })();
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  @keyframes blob-drift {
    0%, 100% { transform: scale(1) translate(0, 0); }
    40%       { transform: scale(1.06) translate(12px, -10px); }
    70%       { transform: scale(0.95) translate(-8px, 12px); }
  }

  @keyframes orbit-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse-error {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.6; }
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    width: 100vw;
    font-family: 'Tajawal', system-ui, sans-serif;
    background: transparent;
    overflow: hidden;
    padding: 16px;
  }

  .splash-container {
    position: relative;
    width: 100%;
    height: 100%;
    background:
      radial-gradient(ellipse 90% 70% at 5%  10%,  rgba(var(--splash-primary-rgb), 0.18) 0%, transparent 55%),
      radial-gradient(ellipse 70% 80% at 95% 95%,  rgba(56, 189, 248, 0.12) 0%, transparent 55%),
      radial-gradient(ellipse 60% 55% at 85% 5%,   rgba(16, 185, 129, 0.14) 0%, transparent 50%),
      radial-gradient(ellipse 55% 50% at 10% 90%,  rgba(99, 102, 241, 0.07) 0%, transparent 50%),
      #f0f4f8;
    border-radius: 28px;
    border: 1px solid rgba(255, 255, 255, 0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    direction: rtl;
    box-shadow:
      0 20px 50px rgba(15, 23, 42, 0.12),
      0 4px 12px rgba(15, 23, 42, 0.04);
  }

  .splash-container::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(15, 23, 42, 0.04) 1px, transparent 1px);
    background-size: 22px 22px;
    border-radius: 28px;
    pointer-events: none;
    animation: blob-drift 12s ease-in-out infinite;
  }

  .splash-container.error-mode {
    background:
      radial-gradient(ellipse 90% 70% at 5%  10%,  rgba(239, 68, 68, 0.12) 0%, transparent 55%),
      radial-gradient(ellipse 70% 80% at 95% 95%,  rgba(239, 68, 68, 0.08) 0%, transparent 55%),
      #fef2f2;
  }

  .splash-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 0 24px;
  }

  .logo-orbit-container {
    position: relative;
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
  }

  .logo-orbit-container::before {
    content: '';
    position: absolute;
    width: 108px;
    height: 108px;
    background: radial-gradient(circle, rgba(var(--splash-primary-rgb), 0.1) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    animation: blob-drift 8s ease-in-out infinite reverse;
  }

  .orbit-path {
    position: absolute;
    width: 90px;
    height: 90px;
    border: 1px dashed rgba(var(--splash-primary-rgb), 0.12);
    border-radius: 50%;
    pointer-events: none;
  }

  .orbit-dot {
    position: absolute;
    width: 4.5px;
    height: 4.5px;
    background: var(--splash-primary);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(var(--splash-primary-rgb), 0.7);
    will-change: transform;
  }

  .splash-svg-logo {
    width: 48px;
    height: 48px;
    color: var(--splash-primary);
  }

  .blueprint-group {
    opacity: 0;
    transform: scale(0.85);
    transform-origin: center center;
    transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
  }

  .blueprint-group.active {
    opacity: 1;
    transform: scale(1);
  }

  .draw-path {
    stroke: #cbd5e1;
    stroke-linecap: round;
    stroke-linejoin: round;
    will-change: stroke-dashoffset;
    transition: stroke 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .blueprint-group.active .draw-path {
    stroke: var(--splash-primary);
  }

  .splash-title {
    font-size: 20px;
    font-weight: 700;
    color: #0f172a;
    margin: 0 0 4px 0;
    letter-spacing: 0.01em;
    text-align: center;
    font-family: 'Tajawal', sans-serif;
  }

  .splash-subtitle-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .splash-subtitle {
    font-size: 9.5px;
    font-weight: 600;
    color: #94a3b8;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-family: 'Outfit', sans-serif;
  }

  .splash-dot-divider {
    font-size: 7px;
    color: #cbd5e1;
  }

  .splash-percentage {
    font-size: 9.5px;
    font-family: 'Outfit', monospace;
    font-weight: 700;
    color: var(--splash-primary);
    letter-spacing: 0.06em;
  }

  .splash-progress-track {
    width: 150px;
    height: 2.5px;
    background: rgba(15, 23, 42, 0.07);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .splash-progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--splash-primary), color-mix(in srgb, var(--splash-primary) 70%, #fff));
    border-radius: 99px;
    transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 6px rgba(var(--splash-primary-rgb), 0.5);
  }

  .splash-status {
    font-size: 11px;
    font-weight: 500;
    color: #94a3b8;
    text-align: center;
    min-height: 18px;
    transition: opacity 0.25s ease;
    font-family: 'Tajawal', sans-serif;
    letter-spacing: 0.01em;
  }

  .splash-version-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-bottom: 14px;
    min-height: 16px;
  }

  .splash-version-badge {
    font-size: 9px;
    font-weight: 700;
    color: #fff;
    background: var(--splash-primary);
    padding: 2px 8px;
    border-radius: 99px;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: opacity 0.4s ease;
    font-family: 'Outfit', monospace;
  }

  .splash-version-badge.visible {
    opacity: 1;
  }

  .splash-error-box {
    display: none;
    margin-top: 8px;
    padding: 8px 14px;
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.25);
    border-radius: 10px;
    max-width: 280px;
    text-align: center;
  }

  .splash-error-box.visible {
    display: block;
    animation: fade-up 0.3s ease;
  }

  .splash-error-title {
    font-size: 11px;
    font-weight: 700;
    color: #dc2626;
    margin-bottom: 4px;
  }

  .splash-error-detail {
    font-size: 9px;
    font-weight: 500;
    color: #ef4444;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="splash-container" id="splash-container">
    <div class="splash-center">
      <div class="logo-orbit-container">
        <div class="orbit-path"></div>
        <div class="orbit-dot" id="orbit-dot"></div>

        <svg class="splash-svg-logo" viewBox="0 0 32 32" fill="none" stroke="currentColor">
          <g id="g-files" class="blueprint-group active">
            <path class="draw-path" d="M6,4 L18,4 L26,12 L26,28 L6,28 Z" stroke-width="1.2" stroke-linejoin="round"/>
            <path class="draw-path" d="M18,4 L18,12 L26,12" stroke-width="1.2" stroke-linejoin="round"/>
            <line class="draw-path" x1="11" y1="17" x2="21" y2="17" stroke-width="1.2"/>
            <line class="draw-path" x1="11" y1="22" x2="21" y2="22" stroke-width="1.2"/>
          </g>

          <g id="g-db" class="blueprint-group">
            <ellipse class="draw-path" cx="16" cy="8" rx="8" ry="3" stroke-width="1.2"/>
            <path class="draw-path" d="M8,8 L8,17 A8,3 0 0,0 24,17 L24,8" stroke-width="1.2"/>
            <path class="draw-path" d="M8,17 L8,26 A8,3 0 0,0 24,26 L24,17" stroke-width="1.2"/>
            <line class="draw-path" x1="11" y1="13" x2="21" y2="13" stroke-dasharray="2 2" stroke-width="0.8"/>
            <line class="draw-path" x1="11" y1="21" x2="21" y2="21" stroke-dasharray="2 2" stroke-width="0.8"/>
          </g>

          <g id="g-sec" class="blueprint-group">
            <circle class="draw-path" cx="16" cy="10" r="5" stroke-width="1.2"/>
            <line class="draw-path" x1="16" y1="15" x2="16" y2="27" stroke-width="1.2"/>
            <line class="draw-path" x1="16" y1="19" x2="21" y2="19" stroke-width="1.2"/>
            <line class="draw-path" x1="16" y1="23" x2="21" y2="23" stroke-width="1.2"/>
          </g>

          <g id="g-logo" class="blueprint-group">
            <rect class="draw-path" x="4" y="4" width="24" height="24" rx="4" ry="4" stroke-width="1.2"/>
            <line class="draw-path" x1="4" y1="12" x2="28" y2="12" stroke-width="1.2"/>
            <line class="draw-path" x1="12" y1="28" x2="12" y2="12" stroke-width="1.2"/>
          </g>
        </svg>
      </div>

      <h1 class="splash-title">الحجازي</h1>
      <div class="splash-subtitle-row">
        <span class="splash-subtitle">ELHEGAZI RETAILER</span>
        <span class="splash-dot-divider">•</span>
        <span class="splash-percentage" id="splash-percentage">0%</span>
      </div>

      <div class="splash-version-row">
        <span class="splash-version-badge" id="splash-version-badge"></span>
      </div>

      <div class="splash-progress-track">
        <div class="splash-progress-fill" id="splash-progress-fill"></div>
      </div>

      <div class="splash-status" id="splash-status">جاري تهيئة ملفات النظام...</div>

      <div class="splash-error-box" id="splash-error-box">
        <div class="splash-error-title" id="splash-error-title"></div>
        <div class="splash-error-detail" id="splash-error-detail"></div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var percentTxt   = document.getElementById('splash-percentage');
      var statusTxt    = document.getElementById('splash-status');
      var progressFill = document.getElementById('splash-progress-fill');
      var versionBadge = document.getElementById('splash-version-badge');
      var errorBox     = document.getElementById('splash-error-box');
      var errorTitle   = document.getElementById('splash-error-title');
      var errorDetail  = document.getElementById('splash-error-detail');
      var container    = document.getElementById('splash-container');

      var steps = [
        { target: 25,  ar: "الخطوة ٠١ // جاري تهيئة ملفات النظام...",          groupId: "g-files" },
        { target: 60,  ar: "الخطوة ٠٢ // الاتصال بقاعدة البيانات المحلية...",  groupId: "g-db"    },
        { target: 85,  ar: "الخطوة ٠٣ // التحقق من ترخيص التشغيل والأمان...", groupId: "g-sec"   },
        { target: 100, ar: "الخطوة ٠٤ // جاري تشغيل واجهة المعاملات...",       groupId: "g-logo"  }
      ];

      var currentPercent = 0;
      var currentStepIdx = 0;
      var isPaused = false;
      var isInstallMode = false;
      var isErrorMode = false;
      var installTimeout = null;

      function drawGroupSVG(groupId) {
        var group = document.getElementById(groupId);
        if (!group) return;

        var paths = group.querySelectorAll('.draw-path');
        paths.forEach(function(p) {
          var length = 80;
          try {
            if (p.getTotalLength) length = p.getTotalLength();
          } catch (_) {
            var tag = p.tagName.toLowerCase();
            if (tag === 'rect')    length = 96;
            else if (tag === 'ellipse') length = 38;
            else if (tag === 'circle')  length = 32;
            else if (tag === 'line')    length = 30;
          }

          p.style.strokeDasharray = length;
          p.style.strokeDashoffset = length;

          p.getBoundingClientRect();

          p.style.transition = 'stroke-dashoffset 0.8s cubic-bezier(0.1, 0.8, 0.2, 1)';
          p.style.strokeDashoffset = '0';
        });
      }

      drawGroupSVG('g-files');

      function changeStatusText(newText) {
        if (!statusTxt) return;
        statusTxt.style.opacity = 0;
        setTimeout(function() {
          statusTxt.textContent = newText;
          statusTxt.style.opacity = 1;
        }, 200);
      }
      window.updateStatus = changeStatusText;

      // Switch splash to "post-update" mode — shows install-specific message
      // and version badge instead of the normal animation sequence.
      window.setInstallMode = function(version) {
        isInstallMode = true;
        if (version && versionBadge) {
          versionBadge.textContent = version;
          versionBadge.classList.add('visible');
        }
        currentPercent = 0;
        progressFill.style.width = '0%';
        percentTxt.textContent = '0%';

        // Switch to database blueprint to indicate schema work
        var oldGroup = document.getElementById(steps[0].groupId);
        if (oldGroup) oldGroup.classList.remove('active');
        setTimeout(function() {
          var dbGroup = document.getElementById('g-db');
          if (dbGroup) {
            dbGroup.classList.add('active');
            drawGroupSVG('g-db');
          }
        }, 300);
        currentStepIdx = 1;

        // Start the animation ticking slowly
        if (!installTimeout) {
          installTimeout = setTimeout(function tick() {
            if (currentPercent < 85) {
              currentPercent += 2;
              if (percentTxt) percentTxt.textContent = currentPercent + '%';
              if (progressFill) progressFill.style.width = currentPercent + '%';
              installTimeout = setTimeout(tick, 1800);
            }
          }, 500);
        }

        changeStatusText("جاري استكمال التثبيت وتحديث قاعدة البيانات...");
      };

      // Show error on splash — called from main.js when migration or DB fails
      window.showSplashError = function(title, detail) {
        isErrorMode = true;
        container.classList.add('error-mode');

        if (errorBox && errorTitle && errorDetail) {
          errorTitle.textContent = title || 'حدث خطأ';
          errorDetail.textContent = detail || 'تعذّر إكمال التثبيت. يرجى استخدام النسخ الاحتياطي.';
          errorBox.classList.add('visible');
        }

        changeStatusText(title || 'حدث خطأ أثناء التثبيت');

        if (percentTxt) percentTxt.textContent = '';
        if (progressFill) progressFill.style.width = '0%';

        if (installTimeout) {
          clearTimeout(installTimeout);
          installTimeout = null;
        }
      };

      function switchBlueprintGroup(oldIdx, newIdx) {
        var oldGroup = document.getElementById(steps[oldIdx].groupId);
        var newGroup = document.getElementById(steps[newIdx].groupId);

        if (oldGroup) oldGroup.classList.remove('active');

        setTimeout(function() {
          if (newGroup) {
            newGroup.classList.add('active');
            drawGroupSVG(steps[newIdx].groupId);
          }
        }, 300);
      }

      function update() {
        if (isInstallMode || isErrorMode) return;
        if (currentPercent >= 100) return;
        if (isPaused) return;

        var currentStep = steps[currentStepIdx];
        if (currentPercent >= currentStep.target && currentStepIdx < steps.length - 1) {
          isPaused = true;

          var oldIdx = currentStepIdx;
          currentStepIdx++;
          var nextStep = steps[currentStepIdx];

          setTimeout(function() {
            isPaused = false;
            changeStatusText(nextStep.ar);
            switchBlueprintGroup(oldIdx, currentStepIdx);
            tick();
          }, 300);

          return;
        }

        var increment = Math.floor(Math.random() * 2) + 1;
        currentPercent = Math.min(100, currentPercent + increment);

        if (percentTxt) percentTxt.textContent = currentPercent + '%';
        if (progressFill) progressFill.style.width = currentPercent + '%';

        var tickTime = Math.floor(Math.random() * 25) + 30;
        setTimeout(update, tickTime);
      }

      function tick() {
        update();
      }

      setTimeout(tick, 300);
    })();
  </script>
</body>
</html>
