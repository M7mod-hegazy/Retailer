appId: com.elhegazi.retailer
productName: ElHegazi Retailer
executableName: ElHegazi-Retailer
copyright: Copyright (c) 2026

files:
  - electron/**/*
  - client/dist/**/*
  - server/**/*
  - shared/**/*
  - package.json
  - "!server/data/**"
  - "!server/**/__tests__/**"
  - "!**/*.map"

directories:
  output: release/win7/x64

asar: true
asarUnpack:
  - "**/*.node"

win:
  icon: electron/assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64

artifactName: "2_INSTALL_SECOND_ElHegazi-Retailer-x64-v${version}.exe"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  perMachine: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: ElHegazi Retailer
  menuCategory: ElHegazi
  # Do NOT auto-launch on Win7: the compatibility shim flag must be enabled on
  # the exe first (see WIN7-TEST/STEPS.txt), otherwise it would crash on finish.
  runAfterFinish: false
  deleteAppDataOnUninstall: false
  installerIcon: electron/assets/icon.ico
  uninstallerIcon: electron/assets/icon.ico
  installerHeaderIcon: electron/assets/icon.ico
  installerSidebar: electron/assets/installerSidebar.bmp
  uninstallerSidebar: electron/assets/installerSidebar.bmp
  installerHeader: electron/assets/installerHeader.bmp
  multiLanguageInstaller: true
  displayLanguageSelector: true
  installerLanguages:
    - ar_SA
    - en_US

publish:
  provider: github
  owner: M7mod-hegazy
  repo: Retailer
  releaseType: release

buildDependenciesFromSource: false
# Native modules are rebuilt/cache-restored per arch by
# electron/scripts/build-win7-test.js before electron-builder runs;
# letting electron-builder rebuild again would be a redundant second compile.
npmRebuild: false
